name: Execution Scraping Automatique

on:
  schedule:
    - cron: '0 9 * * *'  # S'exécute automatiquement TOUS LES JOURS à 9h00 UTC
  workflow_dispatch:     # Permet de lancer le script manuellement en 1 clic pour tester

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Recuperer le code du depot
      uses: actions/checkout@v4

    - name: 2. Installer Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. Installer les librairies de scraping
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 pandas  # Ajoutez ici les librairies de votre script

    - name: 4. Executer le script Python
      run: python mon_script.py

    - name: 5. Enregistrer les modifications sur GitHub
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@://github.com'
        git add -A
        git commit -m "Mise a jour automatique des donnees" || echo "Aucun changement a sauvegarder"
        git push
